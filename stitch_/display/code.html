<style>
        .mix-blend-nebula {
            mix-blend-mode: hard-light;
        }
        
        @keyframes stellarPop {
            0% { transform: scale(0.9); opacity: 0; filter: brightness(2) contrast(1.5); box-shadow: 0 0 0 rgba(211,187,255,0); }
            40% { transform: scale(1.02); opacity: 1; filter: brightness(1.2) contrast(1.1); box-shadow: 0 0 30px rgba(211,187,255,0.6); }
            100% { transform: scale(1); opacity: 0.85; filter: brightness(1) contrast(1); box-shadow: 0 0 10px rgba(211,187,255,0); }
        }

        .animate-stellar-pop {
            animation: stellarPop 2.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 0.5s;
            opacity: 0; /* initial state before animation */
        }
        
        /* Subtle pulse for the outline */
        @keyframes outlinePulse {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(211,187,255,0.4)); opacity: 0.7; }
            50% { filter: drop-shadow(0 0 15px rgba(211,187,255,0.8)); opacity: 1; }
        }
        .outline-glow {
            animation: outlinePulse 4s ease-in-out infinite;
