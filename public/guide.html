<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가이드 화면 - 우주 모자이크</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <!-- node-qrcode 라이브러리 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #05050A; /* Deep space black */
            color: #ffffff;
            margin: 0;
            overflow: hidden;
        }

        .stars-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,1), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 80px 70px, rgba(255,255,255,0.8), rgba(0,0,0,0)),
                radial-gradient(3px 3px at 150px 40px, rgba(255,255,255,1), rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.3;
            z-index: -1;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 3rem;
            box-shadow: 0 10px 50px 0 rgba(0, 0, 0, 0.5);
        }

        /* QR Code Glow */
        .glow-qr {
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.8), 0 0 80px rgba(173, 198, 255, 0.4);
            transition: all 0.5s ease;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-12 relative">
    <div class="stars-bg"></div>

    <main class="w-full max-w-5xl glass-panel p-20 flex flex-col items-center text-center gap-16 relative z-10">
        
        <!-- Header -->
        <div class="space-y-4">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-300 to-purple-300 tracking-tight">
                우주의 일부가 되어보세요
            </h1>
            <p class="text-2xl text-gray-300">
                아래 QR코드를 스캔하거나 주소를 입력하여 사진을 쏘아올려주세요.
            </p>
        </div>

        <!-- QR & URL Area -->
        <div class="flex flex-col items-center gap-6">
            <div id="qrcode-container" class="p-6 bg-white rounded-3xl glow-qr">
                <!-- QR Code canvas will be injected here -->
            </div>
            
            <div class="bg-black/50 border border-white/20 px-8 py-4 rounded-full mt-4">
                <span id="url-text" class="text-3xl font-mono text-indigo-300 tracking-wider">주소를 불러오는 중...</span>
            </div>
        </div>

        <!-- Progress Area -->
        <div class="w-full max-w-2xl flex flex-col items-center gap-4 mt-8">
            <div class="flex justify-between w-full px-4 text-xl font-bold text-gray-300">
                <span>현재 참여자</span>
                <span class="text-indigo-300"><span id="participant-count" class="text-4xl text-white mx-2">0</span> / 12</span>
            </div>
            <div class="w-full h-8 bg-black/60 rounded-full overflow-hidden border border-white/10">
                <div id="progress-bar" class="h-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 transition-all duration-700 ease-out" style="width: 0%;"></div>
            </div>
        </div>

    </main>

    <script>
        const socket = io();
        const qrContainer = document.getElementById('qrcode-container');
        const urlText = document.getElementById('url-text');
        const participantCount = document.getElementById('participant-count');
        const progressBar = document.getElementById('progress-bar');
        
        const MAX_SLOTS = 12;

        function updateProgress(count) {
            participantCount.innerText = count;
            const percentage = (count / MAX_SLOTS) * 100;
            progressBar.style.width = `${percentage}%`;
        }

        // 초기 카운트 조회
        fetch('/api/slots')
            .then(res => res.json())
            .then(data => {
                updateProgress(data.totalFilled);
            })
            .catch(console.error);

        // 터널링 URL 수신 및 QR 생성
        socket.on('tunnel_url', (data) => {
            const uploadUrl = data.url + '/upload.html';
            
            qrContainer.innerHTML = '<canvas id="qr-canvas" class="rounded-2xl"></canvas>';
            const canvas = document.getElementById('qr-canvas');

            QRCode.toCanvas(canvas, uploadUrl, {
                width: 350,
                margin: 2,
                color: { dark: "#000000", light: "#ffffff" },
                errorCorrectionLevel: 'H'
            }, function (error) {
                if (error) console.error('[QR Error]', error);
            });
            
            urlText.innerText = uploadUrl;
        });

        // 새 사진 업로드 시
        socket.on('new_photo', () => {
            let current = parseInt(participantCount.innerText) || 0;
            if (current < MAX_SLOTS) {
                updateProgress(current + 1);
            }
        });

        // 12칸 완성 후 부분 리셋 시 (6칸 유지)
        socket.on('partial_reset', (data) => {
            const keepCount = data.keepIds ? data.keepIds.length : 0;
            updateProgress(keepCount);
        });
        socket.on('config_updated', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
