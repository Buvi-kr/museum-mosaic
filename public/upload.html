<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>별자리 조각 올리기 - 포천아트밸리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #05050A; /* Deep space black */
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }
        
        /* Subtle starry background */
        .stars-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.8), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.6), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, rgba(255,255,255,1), rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 100px 100px;
            opacity: 0.5;
            z-index: -1;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .btn-glow {
            transition: all 0.3s ease;
        }
        .btn-glow:active {
            transform: scale(0.95);
            box-shadow: 0 0 40px rgba(173, 198, 255, 0.6);
        }

        /* State visibility */
        .state-section {
            display: none;
            animation: fadeIn 0.4s ease-out forwards;
        }
        .state-section.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 relative">
    <div class="stars-bg"></div>

    <header class="absolute top-0 w-full py-6 flex flex-col items-center z-50">
        <h1 class="text-xl font-bold tracking-widest text-indigo-300">COSMOS MOSAIC</h1>
        <p class="text-sm text-gray-400 mt-1">포천아트밸리 천문과학관</p>
    </header>

    <main class="w-full max-w-sm mt-12 z-10">
        
        <!-- STATE 1: INITIAL UPLOAD -->
        <section id="state-initial" class="state-section active flex-col items-center text-center gap-8 w-full">
            <div class="space-y-3">
                <h2 class="text-3xl font-extrabold text-white">사진을 쏘아올리세요</h2>
                <p class="text-gray-300 text-base leading-relaxed">
                    지금 바로 우주의 일부가 되어보세요.
                </p>
                <div class="mt-4 inline-flex items-center gap-2 bg-indigo-900/40 border border-indigo-500/30 rounded-full px-5 py-2">
                    <span class="material-symbols-outlined text-indigo-300 text-sm">screen_rotation</span>
                    <span class="text-indigo-200 text-sm font-medium">가로 사진을 강력히 추천합니다!</span>
                </div>
            </div>

            <button onclick="document.getElementById('file-input').click()" class="btn-glow mt-6 w-full aspect-square glass-panel flex flex-col items-center justify-center gap-4 bg-gradient-to-br from-indigo-500/10 to-purple-500/10 hover:from-indigo-500/20 hover:to-purple-500/20 group relative overflow-hidden">
                <div class="absolute inset-0 bg-white/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <span class="material-symbols-outlined text-8xl text-indigo-400 group-active:scale-90 transition-transform duration-300" style="font-variation-settings: 'FILL' 1;">
                    photo_camera
                </span>
                <span class="text-xl font-bold text-indigo-200">사진 찍기 / 선택</span>
            </button>
            <input accept="image/*" class="hidden" id="file-input" type="file" onchange="handleUpload(event)"/>
        </section>

        <!-- STATE 2: UPLOADING -->
        <section id="state-uploading" class="state-section flex-col items-center text-center gap-8 w-full py-10">
            <div class="space-y-6 w-full">
                <span class="material-symbols-outlined text-7xl text-indigo-400 animate-bounce" style="font-variation-settings: 'FILL' 1;">
                    rocket_launch
                </span>
                <h2 class="text-2xl font-bold text-white">우주로 전송 중...</h2>
            </div>
            
            <div class="w-full glass-panel h-6 p-1 relative overflow-hidden">
                <div id="progress-bar" class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full w-0 transition-all duration-300 ease-out relative">
                    <div class="absolute inset-0 bg-[linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent)] bg-[length:200%_100%] animate-[shimmer_1.5s_infinite_linear]"></div>
                </div>
            </div>
            <p id="progress-text" class="text-indigo-200 font-bold text-xl">0%</p>
        </section>

        <!-- STATE 3: SUCCESS -->
        <section id="state-success" class="state-section flex-col items-center text-center gap-8 w-full py-10">
            <div class="w-32 h-32 rounded-full glass-panel flex items-center justify-center bg-green-500/10 border-green-500/30">
                <span class="material-symbols-outlined text-7xl text-green-400" style="font-variation-settings: 'FILL' 1;">
                    check_circle
                </span>
            </div>
            <div class="space-y-4">
                <h2 class="text-3xl font-extrabold text-white">전송 완료!</h2>
                <p class="text-lg text-gray-300">눈앞의 대형 스크린을 확인해보세요.<br>당신의 별이 빛나고 있습니다.</p>
            </div>
            
            <button onclick="resetUI()" class="btn-glow mt-8 w-full py-5 glass-panel bg-indigo-600/20 border-indigo-500/50 flex items-center justify-center gap-3">
                <span class="material-symbols-outlined text-indigo-300">replay</span>
                <span class="text-xl font-bold text-indigo-200">새로운 사진 올리기</span>
            </button>
        </section>

    </main>

    <script>
        function switchState(stateId) {
            document.querySelectorAll('.state-section').forEach(el => el.classList.remove('active'));
            document.getElementById(stateId).classList.add('active');
        }

        function resetUI() {
            document.getElementById('file-input').value = ''; // input 초기화 필수!
            document.getElementById('progress-bar').style.width = '0%';
            document.getElementById('progress-text').innerText = '0%';
            switchState('state-initial');
        }

        async function handleUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            switchState('state-uploading');
            
            // 시각적 피드백
            let progress = 0;
            const bar = document.getElementById('progress-bar');
            const text = document.getElementById('progress-text');
            
            const interval = setInterval(() => {
                if(progress < 90) {
                    progress += Math.floor(Math.random() * 10) + 5;
                    if(progress > 90) progress = 90;
                    bar.style.width = `${progress}%`;
                    text.innerText = `${progress}%`;
                }
            }, 200);

            try {
                const formData = new FormData();
                formData.append('photo', file);

                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                clearInterval(interval);
                
                if (data.ok) {
                    bar.style.width = `100%`;
                    text.innerText = `100%`;
                    
                    setTimeout(() => {
                        switchState('state-success');
                    }, 600);
                } else {
                    alert('업로드 실패: ' + (data.message || '오류 발생'));
                    resetUI();
                }
            } catch (error) {
                console.error(error);
                clearInterval(interval);
                alert('네트워크 오류가 발생했습니다. 다시 시도해주세요.');
                resetUI();
            }
        }
    </script>
</body>
</html>
