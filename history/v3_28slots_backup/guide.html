<!DOCTYPE html>
<html class="dark" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Cosmos Mosaic - Guide Screen</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
    
    <!-- 실시간 통신 및 QR코드 라이브러리 추가 -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/qrcode.min.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#572ba0",
                        "error-container": "#93000a",
                        "surface-container-lowest": "#0b0f10",
                        "primary-container": "#0b0e14",
                        "inverse-primary": "#5c5e66",
                        "tertiary": "#d3bbff",
                        "primary-fixed": "#e1e2eb",
                        "on-primary-fixed-variant": "#44474e",
                        "on-tertiary": "#3f0689",
                        "primary": "#c4c6cf",
                        "surface": "#101415",
                        "inverse-surface": "#e0e3e5",
                        "on-secondary-fixed": "#001a42",
                        "on-primary-fixed": "#191c22",
                        "secondary-container": "#0566d9",
                        "on-primary": "#2e3037",
                        "background": "#101415",
                        "on-error-container": "#ffdad6",
                        "surface-container": "#1d2022",
                        "tertiary-fixed": "#ebdcff",
                        "on-secondary-container": "#e6ecff",
                        "surface-dim": "#101415",
                        "secondary-fixed": "#d8e2ff",
                        "on-surface": "#e0e3e5",
                        "secondary-fixed-dim": "#adc6ff",
                        "surface-tint": "#c4c6cf",
                        "outline": "#909095",
                        "on-error": "#690005",
                        "surface-variant": "#323537",
                        "surface-container-high": "#272a2c",
                        "on-secondary": "#002e6a",
                        "surface-bright": "#363a3b",
                        "on-surface-variant": "#c6c6cb",
                        "on-secondary-fixed-variant": "#004395",
                        "on-tertiary-fixed": "#260059",
                        "secondary": "#adc6ff",
                        "tertiary-fixed-dim": "#d3bbff",
                        "error": "#ffb4ab",
                        "on-tertiary-container": "#8d64d9",
                        "primary-fixed-dim": "#c4c6cf",
                        "outline-variant": "#45474b",
                        "surface-container-highest": "#323537",
                        "on-primary-container": "#797b83",
                        "surface-container-low": "#191c1e",
                        "on-background": "#e0e3e5",
                        "tertiary-container": "#150037",
                        "inverse-on-surface": "#2d3133"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "safe-area": "32px",
                        "nebula-padding": "64px",
                        "mosaic-gap": "4px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-xl": ["Inter"],
                        "display-lg-mobile": ["Inter"],
                        "label-sm": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                        "display-lg": ["72px", {"lineHeight": "80px", "letterSpacing": "-0.04em", "fontWeight": "700"}],
                        "headline-xl": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "display-lg-mobile": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
    <style>
        .glow-qr {
            box-shadow: 0 0 30px 10px rgba(173, 198, 255, 0.4);
            animation: pulse-glow 3s infinite alternate;
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 20px 5px rgba(173, 198, 255, 0.3); }
            100% { box-shadow: 0 0 40px 15px rgba(173, 198, 255, 0.6); }
        }
        .star-pulse {
            animation: twinkle 2s infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.4; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        .glass-panel {
            background: rgba(11, 14, 20, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(173, 198, 255, 0.2);
        }
    </style>
</head>
<body class="bg-background text-on-background w-full h-screen overflow-hidden flex flex-col justify-between selection:bg-secondary-container selection:text-on-secondary-container">
    <!-- Background Layer -->
    <div class="fixed inset-0 z-0">
        <div class="w-full h-full bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDzo-z1EFXH3YP5CRRoo7sufBByFWpZpgecAG-dMTmqPZb0FAMgM1hNoXKfSNmXTUsnJ7Iu4gHCF5kezHnrb9prPEA42Lvx_OVpr_drda5JqAI8ICjdkFyOSDk31mM1woFKkUulkfec5zHe8HzuvAvp6v4ts7mSedTQKzpNZ3XOvbP-tMd5K1AKpA5bW9OlbJm8V-GHPFzjspSny1L-9DUmRxwdPD6e68-hMZmEkdXUwf-MRuO6jswHcO_xYuXxhsbAZrPSYWCmZRAk')"></div>
        <div class="absolute inset-0 bg-background/40 mix-blend-multiply"></div>
    </div>

    <!-- Top Navigation -->
    <header class="fixed top-0 w-full z-50 flex justify-between items-center px-nebula-padding h-20 bg-surface/60 backdrop-blur-xl shadow-none">
        <div class="flex items-center gap-4">
            <span class="material-symbols-outlined text-primary text-4xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">auto_awesome_mosaic</span>
            <h1 class="font-headline-xl text-headline-xl text-primary tracking-tighter">Cosmos Mosaic</h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="relative z-10 flex-grow flex flex-col items-center justify-center px-nebula-padding text-center pt-20">
        <div class="glass-panel rounded-[2rem] p-16 max-w-5xl w-full flex flex-col items-center gap-12 shadow-2xl">
            <!-- Titles -->
            <div class="space-y-6">
                <h2 class="font-display-lg text-display-lg text-secondary tracking-tight">사진을 찍어 우주의 일부가 되어보세요</h2>
                <p class="font-headline-lg text-headline-lg text-on-surface-variant max-w-3xl mx-auto">
                    QR코드를 스캔하여 사진을 업로드하면 망원경 모자이크가 완성됩니다.
                </p>
            </div>
            
            <!-- QR Code Centerpiece -->
            <div class="flex flex-col items-center gap-6 mt-8">
                <div class="p-4 bg-white rounded-3xl glow-qr relative" id="qrcode-container">
                    <!-- QR code will be generated here -->
                </div>
                <div id="url-text" class="text-secondary/70 font-body-md mt-2">Connecting to space...</div>
                
                <div class="bg-secondary-container/20 border border-secondary/30 px-8 py-3 rounded-full flex items-center gap-3 mt-4">
                    <span class="material-symbols-outlined text-secondary text-2xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
                    <span class="font-headline-lg text-headline-lg text-secondary uppercase tracking-widest">참여하기</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer / Counter -->
    <footer class="relative z-10 w-full px-nebula-padding pb-nebula-padding flex justify-end items-end pointer-events-none">
        <div class="glass-panel px-8 py-6 rounded-2xl flex items-center gap-4">
            <span class="material-symbols-outlined text-tertiary star-pulse text-4xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">stars</span>
            <div class="flex flex-col items-start">
                <span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Live Connection</span>
                <span class="font-headline-lg text-headline-lg text-on-surface">현재 참여 인원: <strong class="text-tertiary" id="participant-count">0</strong>명</span>
            </div>
        </div>
    </footer>

    <script>
        const socket = io();
        const qrContainer = document.getElementById('qrcode-container');
        const urlText = document.getElementById('url-text');
        const participantCount = document.getElementById('participant-count');
        let currentQR = null;

        // 초기 카운트 조회
        fetch('/api/slots')
            .then(res => res.json())
            .then(data => {
                participantCount.innerText = data.totalFilled;
            })
            .catch(console.error);

        // QR 생성 이벤트
        socket.on('tunnel_url', (data) => {
            const uploadUrl = data.url + '/upload.html';
            
            // 기존 캔버스 제거
            qrContainer.innerHTML = '<canvas id="qr-canvas" class="rounded-xl"></canvas>';
            const canvas = document.getElementById('qr-canvas');

            // node-qrcode 라이브러리 문법으로 QR 생성
            QRCode.toCanvas(canvas, uploadUrl, {
                width: 256,
                margin: 2,
                color: {
                    dark: "#000000",
                    light: "#ffffff"
                },
                errorCorrectionLevel: 'H'
            }, function (error) {
                if (error) console.error('[QR Error]', error);
            });
            
            urlText.innerText = uploadUrl;
        });

        // 새 사진 업로드 시 카운트 업데이트
        socket.on('new_photo', (data) => {
            participantCount.innerText = data.totalFilled;
        });
    </script>
</body>
</html>
